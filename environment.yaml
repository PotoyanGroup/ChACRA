name: chacra-env
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core simulation ────────────────────────────────────────────────────
  - openmm>=8.1
  - openmmforcefields
  - pdbfixer

  # ── femto dependencies (conda-only packages) ──────────────────────────
  # femto itself is installed via pip in install.sh (from the ChACRA fork).
  # These packages are NOT on PyPI and must come from conda-forge.
  - mdtop
  - pydantic-units

  # ── femto dependencies (also on PyPI, but pre-installed via conda for
  #    speed / binary builds) ────────────────────────────────────────────
  - numpy
  - scipy
  - pydantic>=2
  - click
  - cloup
  - pyarrow
  - tqdm
  - pyyaml
  - pandas
  - omegaconf
  - gputil
  - sympy
  - pymbar>=4
  - networkx
  - mdtraj
  - rdkit

  # ── ChACRA core ───────────────────────────────────────────────────────
  - mdanalysis>=2.9.0
  - matplotlib
  - scikit-learn
  - nglview
  - prolif
  - pre-commit
